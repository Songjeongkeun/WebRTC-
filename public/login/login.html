<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>
    <div class="container">
        <div>
            <form id="loginForm">
                <div class="loginForm">
                    <div class="loginTitle">
                        <h1>로그인</h1>
                    </div>
                    <p>아이디</p>
                    <input type="text" name="userid" id="id" placeholder="아이디를 입력하세요.">
                    <p>비밀번호</p>
                    <input type="password" name="password" id="pw" placeholder="비밀번호를 입력하세요."></br></br>
                    <button id="loginBtn">로그인</button></br>
                    <div class="signup">
                        <a href="/auth/signup">계정 만들기</a>
                    </div>
                </div>
            </form>
        </div>
    </div>
    <script src="/login/login.js"></script>
</body>

</html>
