<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로비</title>
    <link rel="stylesheet" href="lobby.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <strong>전체 로비</strong>
        </div>
        <!-- 동적으로 추가될 방 리스트들 -->
        <ul class="lobby-list">
            <li class="lobby-item">
                <div class="lobby-item-title">
                    <span>방 제목</span>
                    <span>1 / 2</span>
                </div>
            </li>
            <li class="lobby-item">
                <div class="lobby-item-title">
                    <span>방 제목</span>
                    <span>1 / 2</span>
                </div>
            </li>
            <li class="lobby-item">
                <div class="lobby-item-title">
                    <span>방 제목</span>
                    <span>1 / 2</span>
                </div>
            </li>
        </ul>
        <!-- 동적으로 추가될 방 리스트들 -->

        <footer>
            <input type="text" id="username-input" placeholder="사용자 이름을 입력하세요">
            <input type="text" id="room-title-input" placeholder="방 제목을 입력하세요">
            <button type="button" id="create-room">방생성</button>
        </footer>


    </div>

    <!-- 로비 목록 조회와 방 생성 기능을 실행한다 -->
    <script src="../js/lobby.js"></script>
</body>
</html>
